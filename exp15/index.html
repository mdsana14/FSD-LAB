<!DOCTYPE html>
<html>
<head>
    <title>Leave Management System</title>

    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
        }

        .box {
            margin: 50px auto;
            width: 350px;
            padding: 20px;
            background: #222;
            border-radius: 10px;
        }

        select, button {
            padding: 10px;
            margin: 10px;
            width: 200px;
            border: none;
            border-radius: 5px;
        }

        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Leave Management System</h1>

<div id="root"></div>

<script type="text/babel">

function LeaveApp() {
    const [casual, setCasual] = React.useState(10);
    const [medical, setMedical] = React.useState(8);
    const [type, setType] = React.useState("");

    const applyLeave = () => {
        if (type === "casual" && casual > 0) {
            setCasual(casual - 1);
        } else if (type === "medical" && medical > 0) {
            setMedical(medical - 1);
        } else {
            alert("No leaves available");
        }
    };

    return (
        <div className="box">
            <h3>Casual Leaves: {casual}</h3>
            <h3>Medical Leaves: {medical}</h3>

            <select onChange={(e) => setType(e.target.value)}>
                <option value="">Select Leave Type</option>
                <option value="casual">Casual Leave</option>
                <option value="medical">Medical Leave</option>
            </select>

            <br />

            <button onClick={applyLeave}>Apply Leave</button>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LeaveApp />);

</script>

</body>
</html>
